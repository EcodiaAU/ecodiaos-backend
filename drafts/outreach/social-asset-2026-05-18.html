<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Ecodia — 2026-05-18</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;1,400&display=swap">
<style>
  :root {
    --bg: #ffffff;
    --fg: #000000;
    --fg-trace: rgba(0,0,0,0.32);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    width: 1080px;
    height: 1350px;
    background: var(--bg);
    color: var(--fg);
    font-family: "EB Garamond", "Iowan Old Style", Garamond, "Times New Roman", serif;
    display: grid;
    grid-template-rows: 1fr auto;
    padding: 96px;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  main {
    display: grid;
    place-items: center;
    text-align: center;
  }
  p.sentence {
    font-style: italic;
    font-weight: 400;
    font-size: 68px;
    line-height: 1.24;
    letter-spacing: -0.012em;
    max-width: 18ch;
    margin: 0;
    text-wrap: balance;
    font-feature-settings: "kern", "liga", "dlig", "onum";
  }
  footer {
    text-align: center;
    font-size: 20px;
    letter-spacing: 0.04em;
    color: var(--fg-trace);
    font-style: italic;
    line-height: 1.6;
  }
</style>
</head>
<body>
  <main>
    <p class="sentence">We build production web and mobile apps for organisations that need them to actually work.</p>
  </main>
  <footer>ecodia.au &middot; code@ecodia.au</footer>
</body>
</html>
