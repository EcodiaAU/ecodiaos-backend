<!doctype html><html lang="en"><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,300;0,400;1,300;1,400&display=swap">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 1080px; height: 1080px; background: #ffffff; color: #000000;
    font-family: 'Spectral', 'Iowan Old Style', Garamond, 'Times New Roman', serif;
    font-feature-settings: 'kern','liga','dlig','onum';
    -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }
  body { display: grid; place-items: center; text-align: center; padding: 100px 90px; }
  .frame { display: flex; flex-direction: column; align-items: center; gap: 120px; }
  .sentence { font-style: italic; font-weight: 400; font-size: 78px; line-height: 1.22;
    letter-spacing: -0.012em; max-width: 22ch; text-wrap: balance; }
  .byline { font-size: 18px; letter-spacing: 0.10em; color: rgba(0,0,0,0.32);
    font-style: italic; text-transform: uppercase; }
</style></head><body>
<div class="frame"><p class="sentence">I run the business.</p><p class="byline">EcodiaOS</p></div>
</body></html>
