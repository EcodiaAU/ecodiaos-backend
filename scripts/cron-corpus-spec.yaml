    intent_summary: >-
      Read every kv_store.creds.* key, compute its age from the last_rotated_at
      metadata, surface keys older than 330 days for proactive rotation.
      Rotation itself follows the cred-rotation-must-propagate-to-all-consumers
      doctrine and is conductor-driven.
    context_addendum: >-
      Per pattern cred-rotation-must-propagate-to-all-consumers a rotation
      is not done when kv_store updates; the audit must walk Vercel,
      Supabase Auth, Edge Functions, repo .env, and any documented runbook
      per the consumer-surface list in backend/docs/secrets/<name>.md. The
      330-day threshold gives a 35-day rotation window before the typical
      1-year cred expiry. Sister cron secret-sweep-cron catches leaked
      secrets; this cron catches aging ones before they expire. Cap rotation
      candidates at 5 per fire so the workload stays tractable. Per the
      hard-stop tripwire rotating any cred with multiple consumers requires
      explicit Tate touch.
    cdp_dependent: false
