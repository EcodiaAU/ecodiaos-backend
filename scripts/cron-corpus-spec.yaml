# Cron corpus manifest. 75 entries faithfully extracted from
# docs/superpowers/specs/2026-06-03-cron-corpus-design.md (v3.1 commit 9f023e55).
# Schema enforced by scripts/cron_prompt_builder.py validators.
# Resume order = file order = spec table order.
# Counts: 30 Phase-1 (foundation) + 26 Phase-2 (business cognition) + 19 Phase-3 (stretch).
# Exactly 1 cdp_dependent entry (app-store-review-watch), deferred until Mac mini.

crons:
  # ===== PHASE 1: FOUNDATION (30 crons) =====

  # --- Observe (foundational) ---
  - name: gmail-inbox-poll
    phase: 1
    schedule: every 2h
    tz: Australia/Brisbane
    lm_layer: CAPTURE
    intent_summary: >-
      Triage unread mail in both code@ecodia.au and tate@ecodia.au within
      business hours (07-21 AEST). Label and autoarchive vendor or transactional
      mail. Insert status_board rows for actionable client or contract-bearing
      messages with next_action_by set to whoever owes the next move.
    context_addendum: >-
      This cron replaces the dead emailArrival file-watcher listener tracked at
      status_board row 5129c018. The new substrate is scheduler-driven polling
      rather than filesystem events. Read both inboxes via the ecodia-comms MCP
      gmail_list_messages tool, pass `inbox: "tate@ecodia.au"` for Tate's mailbox
      since code@ is the default. Honour the no-client-contact-without-tate-goahead
      doctrine: never auto-reply. Business-hour guard: read the current AEST hour
      from the temporal stamp and exit silent with one kv_store.set if outside
      07-21 to avoid burning fires at 3am. Per pattern gmail-inbox-default-is-mine-not-tates.
    cdp_dependent: false

  - name: calendar-watch
    phase: 1
    schedule: every 1h
    tz: Australia/Brisbane
    lm_layer: CAPTURE
    intent_summary: >-
      Surface upcoming calendar events in the next 24h that need preparation,
      missed slots from the last 24h, and new invites awaiting response. Insert
      one status_board row per actionable surface so the morning briefing can
      pick them up the next time it fires.
    context_addendum: >-
      Reach Google Calendar via the ecodia-comms MCP calendar_list_events tool.
      Business-hour guard 07-19 AEST. Skip events Tate already accepted with no
      prep needed. For any meeting flagged as needing prep, draft a prep brief
      into kv_store under the meeting id and link it from the status_board row.
      Never auto-decline anything; declines are Tate-only per the autonomy
      doctrine and the no-client-contact rule. Calendar surfaces both Ecodia
      work meetings and personal anchors (gym, family touchpoints), treat both
      with equal seriousness when surfacing context.
    cdp_dependent: false

  - name: stripe-event-poll
    phase: 1
    schedule: every 2h
    tz: Australia/Brisbane
    lm_layer: CAPTURE
    intent_summary: >-
      Read recent Stripe activity (charges, disputes, failed subscriptions,
      churn signals) via the ecodia-money MCP. Insert status_board P2 rows per
      dispute or fraud signal. Silent exit with a kv_store.set when nothing
      actionable surfaces, since most days will be quiet.
    context_addendum: >-
      Current utility is low because most Ecodia revenue arrives as direct
      bank transfer rather than Stripe. This cron sits in place ready for the
      Stripe-100% pivot Tate built the agentic Stripe stack for; cadence is
      2h not 30m to reflect current state and should be tightened on pivot
      day. The ecodia-accountant skill auto-loads on finance triggers and
      owns the broader Stripe + bookkeeping doctrine. Cross-check any dispute
      against the customer record in the CRM before escalating; spurious
      Stripe Radar fraud flags are common and not all merit a P2 row.
    cdp_dependent: false

  - name: github-push-ci-watch
    phase: 1
    schedule: every 30m
    tz: Australia/Brisbane
    lm_layer: CAPTURE
    intent_summary: >-
      Across EcodiaAU and EcodiaTate GitHub organisations, watch the last 2h
      of pushes for failing GitHub Actions or CI runs. Surface red builds plus
      commit sha plus branch plus failing-job name to status_board so the
      author or the next cron worker can fix forward without delay.
    context_addendum: >-
      Active repos live under the EcodiaAU org as of 2026-06-02 cutover;
      legacy and archived repos remain under EcodiaTate. Pull requests are
      not the working norm at Ecodia per solo-fork-pushes-to-main-no-pr-ceremony,
      so this cron watches direct pushes to main rather than PR checks. Use
      the ecodia-code MCP github_list_workflow_runs tool scoped to the recent
      window. Vercel deploys are watched by a separate cron, so focus only on
      GitHub Actions, lint, test, and build jobs here. Skip the noisy bot
      workflows that fire on every push.
    cdp_dependent: false

  - name: vercel-deploy-monitor
    phase: 1
    schedule: every 2h
    tz: Australia/Brisbane
    lm_layer: CAPTURE
    intent_summary: >-
      Across all Vercel projects under both EcodiaAU and the personal account,
      query the last 2h of deployments. Insert a status_board P2 row per
      project showing ERROR or CANCELED state with the failing deployment URL
      and the commit sha so the next worker can fix forward.
    context_addendum: >-
      Vercel deploys need a GitHub-recognised git commit author or they
      silently skip per vercel-deploys-need-github-recognised-commit-author.
      A deploy that never started is just as broken as one that errored, so
      cross-check the latest commit on each main branch against the latest
      Vercel deploy timestamp; gap of more than 10 minutes warrants
      investigation. Read via the ecodia-code MCP vercel_list_deployments
      tool. Honour vercel-env-vars-bake-at-build-audit-when-prod-bug-but-source-looks-right
      when triaging weird production behaviour.
    cdp_dependent: false

  - name: vps-substrate-health
    phase: 1
    schedule: every 1h
    tz: Australia/Brisbane
    lm_layer: CAPTURE
    intent_summary: >-
      Probe Postgres (Supabase project ref nxmtfzofemtrlezlyhcj), Neo4j Aura,
      and the MCP gateway for reachability. Read kv_store last-write sentinels
      to confirm writes are landing. Insert a P1 status_board row on any hard
      failure so the conductor sees it on next turn-start.
    context_addendum: >-
      The 10 narrow domain-scoped MCP connectors are at
      api.admin.ecodia.au/api/mcp/ecodia-<name>. Probe ecodia-core first since
      it is the daily-driver substrate; a failure there cascades to every
      other cron. Sentinel keys live under kv_store.cron.<name>.last_fire_ts
      per the liveness telemetry section of the corpus design. Do not probe
      every connector every fire; round-robin one heavier connector per fire
      to spread the load. If Postgres is up but Neo4j Aura is down, that is
      a P2 not a P1 since most crons survive without graph writes for a few hours.
    cdp_dependent: false

  - name: disk-and-credentials-pulse
    phase: 1
    schedule: every 6h
    tz: Australia/Brisbane
    lm_layer: CAPTURE
    intent_summary: >-
      Verify D:/PRIVATE/ecodia-creds/ directory is intact (per-account JSON
      files for tate, code, money plus supabase.env), confirm the cred-refresher
      daemon is healthy, and probe for rogue env changes. Insert a P1
      status_board row on any drift detected.
    context_addendum: >-
      The cred-refresher daemon keeps the per-account OAuth tokens fresh via
      a 30-min refresh job. Per pattern never-blind-restart-pm2-cred-clobber,
      a blind pm2 restart has thrice reloaded the zombie refresh-clobber-watchdog
      and signed out every Claude account. This cron probes the file mtime
      and refresh job freshness without touching pm2. Read supabase.env via
      a stat-only check; never print the value. Per pattern
      kv-store-wide-bearer-must-be-local-on-corazon the bearer must stay local
      for autonomy to hold through SY094 and ASC ship flows.
    cdp_dependent: false

  - name: client-app-health-probe
    phase: 1
    schedule: every 4h
    tz: Australia/Brisbane
    lm_layer: CAPTURE
    intent_summary: >-
      Probe every shipped client surface (Co-Exist, Roam/Glovebox, Chambers,
      Goodreach, Resonaverde) for HTTP 200 reachability, error-rate spike,
      and Core Web Vitals degradation. Insert a P2 status_board row per
      surface in degraded state with the probe evidence attached.
    context_addendum: >-
      Active client list lives under clients/ as one .md file per slug; archived
      clients live in clients/archived/ and should not be probed. Co-Exist app
      test login exists in kv_store.creds.coexist as {url,email,password} for
      authed probes; per pattern visually-verify-post-auth-not-just-unauth-shell
      an unauthed probe misses the auth-side bugs. Skip the per-tenant Chambers
      subdomains for now; probe only the canonical surfaces. Slow page-load
      (>3s) is a P3 not a P2 unless it crosses 8s.
    cdp_dependent: false

  - name: zernio-dm-poll
    phase: 1
    schedule: every 2h
    tz: Australia/Brisbane
    lm_layer: CAPTURE
    intent_summary: >-
      Poll DMs on the two Zernio accounts that ship DM features (Instagram
      and LinkedIn). Triage actionable inbounds to status_board with
      next_action_by set correctly. Autolabel vendor or spam. Business hours
      08-20 AEST only.
    context_addendum: >-
      Use the ecodia-comms (or full) MCP zernio_get_conversations tool. NEVER
      auto-reply without Tate go-ahead per the no-client-contact doctrine;
      drafts to the approval queue are OK when the inbound clearly warrants
      one. Two-channel marketing doctrine per
      two-channel-marketing-doctrine-2026-05-18 applies: EcodiaOS authors as
      AI on socials, Tate IRL is the relationship channel. DMs from people
      in orbit get higher priority than cold inbounds; cross-check sender
      against the CRM. Spam patterns are well-known; do not write a status_board
      row for every crypto scam.
    cdp_dependent: false

  - name: zernio-analytics-watch
    phase: 1
    schedule: daily 19:00
    tz: Australia/Brisbane
    lm_layer: CAPTURE
    intent_summary: >-
      Read analytics from the two Zernio accounts that ship analytics
      (Instagram and LinkedIn). Capture top post, engagement rate, follower
      delta, link clicks. Run anomaly detection against the 14-day baseline.
      Write a weekly trend Episode to Neo4j on Sundays.
    context_addendum: >-
      Use the zernio_get_analytics tool. The ecodia-does-not-do-marketing-broadcast
      doctrine means raw engagement numbers are not the goal; the signal we
      care about is whether content is reaching the right people in orbit.
      Anomalies (post that went unexpectedly far, follower spike from a
      specific source) deserve a status_board row because they hint at
      partnerships or content shapes worth doubling down on. Status_board P3
      for routine reports, P2 for genuine anomalies. Weekly Sunday roll-up
      goes to a Neo4j Episode node tagged with the week-of date.
    cdp_dependent: false

  # --- Orient (foundational) ---
  - name: status-board-drift-audit
    phase: 1
    schedule: daily 09:00
    tz: Australia/Brisbane
    lm_layer: RE-AUDIT
    intent_summary: >-
      Run a slice-query audit of the active status_board, live-probe the drift
      candidates against git, disk, Vercel, Supabase, and Neo4j, and archive
      rows whose work has actually shipped. Insert a P3 summary row with the
      audit numbers (rows audited, drift bucket counts, archived count).
    context_addendum: >-
      Per pattern drift-audit-slice-queries-beat-row-dump-queries, a SELECT *
      row dump exceeds the tool-result token cap on boards over 50 rows; the
      categorical answer lives in `count(*) FILTER (WHERE ...)` aggregates.
      Per pattern status-board-drift-audit-is-canonical-thin-on-main-meta-loop-work,
      this is the right work for any hour when no other actionable surface is
      available. Classify drift candidates into still-accurate, status-changed,
      completed, and duplicate buckets, then update atomically. Never archive
      on vibes per verify-deployed-state-against-narrated-state.
    cdp_dependent: false

  - name: neo4j-stale-node-audit
    phase: 1
    schedule: weekly Sun 20:00
    tz: Australia/Brisbane
    lm_layer: RE-AUDIT
    intent_summary: >-
      Probe Neo4j for Reflection and Episode nodes older than 90 days with
      zero inbound relationships and no retrieval hits in the last 30 days.
      Surface archive candidates to status_board for conductor-confirmed
      archival rather than auto-archiving.
    context_addendum: >-
      Neo4j is the canonical memory substrate with over 5000 nodes. Per the
      memory substrate doctrine in patterns/memory-substrate-doctrine-neo4j-vs-auto-memory-2026-05-15,
      Decision, Episode, Pattern, Strategic_Direction nodes belong in Neo4j
      while Tate-preference and ephemeral state live in auto-memory. Demotion
      criteria: no inbound relationships AND age over 90 days AND no retrieval
      in 30 days. Archival is conductor-confirmed not Routine-autonomous. Use
      graph_query for Cypher reads. Cap the candidate list at 50 per fire to
      keep the conductor review tractable.
    cdp_dependent: false

  - name: auto-memory-promotion-audit
    phase: 1
    schedule: daily 07:00
    tz: Australia/Brisbane
    lm_layer: TUNE
    intent_summary: >-
      Scan the Anthropic auto-memory at
      C:/Users/tjdTa/.claude/projects/d---code-ecodiaos-backend/memory/ for
      feedback entries cited 5 or more times. Surface Pattern node promotion
      candidates to status_board for conductor confirmation; promotion writes
      stay conductor-owned not Routine-autonomous.
    context_addendum: >-
      Promotion path per the memory substrate doctrine: cited feedback with
      at least 5 cites becomes a Pattern node; long-stable project state
      becomes a Strategic_Direction or Project node; load-bearing reference
      cited by Routine prompts becomes a Pattern node. Cross-check the
      candidate text against existing patterns/ files via grep so duplicates
      do not get promoted. The MEMORY.md silent-truncation incident on
      2026-06-01 makes the size guard cron a sibling worth coordinating with.
      Cap candidates at 10 per fire so conductor review stays a same-turn task.
    cdp_dependent: false

  - name: kv-store-hygiene
    phase: 1
    schedule: weekly Sat 21:00
    tz: Australia/Brisbane
    lm_layer: RE-AUDIT
    intent_summary: >-
      Audit kv_store for stale ceo.* keys older than 90 days, keys referenced
      in code or patterns but missing in the store, and schema drift in
      well-known key shapes. Surface findings to status_board with cleanup
      proposals for conductor review.
    context_addendum: >-
      kv_store on the VPS holds credentials (under creds.* which is read-deny
      to most bearers), MCP bearers, and ephemeral state. ceo.* prefix holds
      conductor-side memory of in-flight work; entries older than 90 days
      are almost certainly stale per the autonomy doctrine that kv_store is
      ephemeral and Neo4j is durable. Per pattern
      re-probe-stale-health-check-readings-before-acting-on-cached-alerts,
      stale kv_store reads leak yesterday's state into today's context.
      Group findings by prefix in the status_board row for easy triage.
    cdp_dependent: false

  - name: codebase-manifest-refresh
    phase: 1
    schedule: every 6h
    tz: Australia/Brisbane
    lm_layer: RE-AUDIT
    intent_summary: >-
      Refresh codebase-manifest/index.sqlite so the codebase-orient skill
      stays current with on-disk reality. Run the indexer over backend/ and
      the active client repos. Insert a P3 row only on indexer error; silent
      success on clean re-index per the conditional-deliverable doctrine.
    context_addendum: >-
      The codebase-orient skill reads this sqlite to emit a 200-word
      orientation brief at session start, replacing manual repo scans with
      Glob/Grep. A stale index means session orientation operates on yesterday's
      truth, which is a slow rot. The indexer process and watcher PID live in
      codebase-manifest/. Per pattern
      cron-deliverables-can-be-conditional-not-all-fires-must-ship a clean
      no-change re-index is correct silent success. Cap the run at 10 minutes;
      partial index is better than a hung process holding the file lock.
    cdp_dependent: false

  - name: memory-md-size-guard
    phase: 1
    schedule: daily 04:30
    tz: Australia/Brisbane
    lm_layer: RE-AUDIT
    intent_summary: >-
      Probe MEMORY.md at
      C:/Users/tjdTa/.claude/projects/d---code-ecodiaos-backend/memory/MEMORY.md
      for byte-count. If approaching the 24KB cap, surface a trim candidate
      list to status_board with the oldest unreferenced entries first.
    context_addendum: >-
      The MEMORY.md silent-truncation incident was the 2026-06-01 cold-start
      failure that turned this cron from optional into load-bearing. Anthropic
      auto-memory caps the file at roughly 24KB; silent truncation removes
      entries from the END of the file, which is where the newest references
      live. Trim candidates should be the OLDEST historical entries first,
      not the newest. Cross-check each trim candidate against grep over
      patterns/ and CLAUDE.md to confirm it is not actively referenced.
      Never trim automatically; surface to conductor for review and confirmation.
    cdp_dependent: false

  - name: neo4j-entity-dedup-sweep
    phase: 1
    schedule: weekly Sat 20:00
    tz: Australia/Brisbane
    lm_layer: RE-AUDIT
    intent_summary: >-
      Probe Neo4j for duplicate canonical entities (Person, Organization,
      Project) via name fuzzy-match plus property overlap. Surface merge
      candidates to status_board with a confidence score so the conductor
      can confirm or reject each merge.
    context_addendum: >-
      Per pattern neo4j-canonical-entity-dedup the canonical entity policy is
      one node per real-world thing, with relationships rather than property
      duplication. Fuzzy match on name (Levenshtein under 3) plus at least
      one shared property (email, ABN, github handle, etc) gives a
      high-confidence merge candidate. Below that threshold, list the
      candidates but flag low-confidence so the conductor knows the manual
      review is heavier. Use graph_search semantic matching for the broader
      sweep and graph_query Cypher for confirming property overlaps. Cap
      candidates at 20 per fire.
    cdp_dependent: false

  # --- Learn (foundational seven-layer plumbing) ---
  - name: patterns-index-regen
    phase: 1
    schedule: daily 22:00
    tz: Australia/Brisbane
    lm_layer: CODIFY
    intent_summary: >-
      Run scripts/regen-patterns-index.js to emit a fresh patterns/INDEX.md.
      Silent exit with one kv_store.set on no-diff per the conditional-deliverable
      doctrine. Insert a P3 row only on non-zero exit code from the script.
    context_addendum: >-
      Per Decision 2026-05-04 commit 773697d the cron invokes the deterministic
      walk script directly rather than dispatching a fork; the indexer has no
      agentic decision component and fork overhead was waste. The walk reads
      every patterns/*.md, sorts by triggers frontmatter, and renders the
      human-readable index. Status_board row e86b6437 tracks the broader PM2
      warmup-collision investigation that occasionally affects this cron. Per
      pattern cron-deliverables-can-be-conditional-not-all-fires-must-ship a
      clean no-diff exit is correct silent success.
    cdp_dependent: false

  - name: patterns-skill-mirror-sync
    phase: 1
    schedule: daily 22:30
    tz: Australia/Brisbane
    lm_layer: CODIFY
    intent_summary: >-
      Generate the per-slug skill mirror under .claude/skills/ for every
      active pattern in patterns/. Ensure archival in patterns/ propagates
      to skill mirror removal so the skill list stays in sync with live
      doctrine.
    context_addendum: >-
      Selection criterion is concrete and grep-checkable. The pattern
      frontmatter schema actually has these fields: triggers (mandatory,
      kebab-case keyword list), status (optional, defaults to active when
      omitted; explicit values are active, narrowed, archived per the
      pattern-lifecycle doctrine), name, description, priority, canonical,
      mined_from. There is no `skill` field. Mirror every pattern in
      patterns/ whose status is active (explicit or omitted). Skip
      patterns/_archived/ entirely. Skip patterns where status is
      narrowed or archived in the frontmatter even if the file still
      lives at the top level. Output path is .claude/skills/<slug>/SKILL.md
      where slug is the file stem. When a pattern transitions to archived
      (status flipped or file moved to patterns/_archived/), remove the
      corresponding .claude/skills/<slug>/SKILL.md mirror so the skill
      list does not surface dead doctrine. Per the four-part bundle
      doctrine, plugin plus skill plus hook plus agent ship together; the
      skill mirror is the visible surface of the pattern in Tate's session.
    cdp_dependent: false

  - name: pattern-corpus-health-check
    phase: 1
    schedule: weekly Sun 22:00
    tz: Australia/Brisbane
    lm_layer: TUNE
    intent_summary: >-
      Classify every pattern in patterns/ into active, narrowed, or archived
      based on telemetry. Edit frontmatter for narrowed and archived classifications.
      Use git mv to move archived patterns to patterns/_archived/. Insert a
      single P3 status_board row summarising the classifications.
    context_addendum: >-
      Per pattern pattern-lifecycle-active-narrowed-archived the tuning
      thresholds are: NOT-APPLIED rate over 70% for 7d narrows triggers; zero
      fires for over 30d makes a pattern an archive candidate (release recipes
      excepted); tagged_silent rate over 50% for 7d retires or restates.
      Tate-flagged false positives in chat narrow or archive same-arc. Read
      Phase C telemetry from application-events.jsonl in the telemetry dir.
      The weekly Sunday 21:00 AEST slot was the original; nudged to 22:00
      here to give patterns-skill-mirror-sync time to settle before the
      health check runs.
    cdp_dependent: false

  - name: surfacing-rate-probe
    phase: 1
    schedule: daily 06:00
    tz: Australia/Brisbane
    lm_layer: SURFACE
    intent_summary: >-
      Run learning-telemetry-report.py against application-events.jsonl to
      detect dark arcs in the learning machine. Insert a P1 status_board row
      if hooks fired fewer than 5 times over the last 24h, which indicates
      the surfacing layer is broken.
    context_addendum: >-
      The seven-layer learning machine has four arrows that must stay lit:
      CAPTURE feeds CODIFY, CODIFY feeds SURFACE, SURFACE feeds APPLY, APPLY
      feeds TUNE. Per pattern recursive-improvement-loop-anatomy a dark arrow
      means a knowledge leak the audit must name rather than strengthening
      a healthy layer. This cron also feeds liveness telemetry per the corpus
      design Liveness telemetry section. Surfacing rate under 5 fires in 24h
      probably means hook scripts moved or matchers drifted; cross-check via
      the hook-matcher-drift-audit cron's last fire.
    cdp_dependent: false

  - name: hook-matcher-drift-audit
    phase: 1
    schedule: weekly Sat 22:00
    tz: Australia/Brisbane
    lm_layer: SURFACE
    intent_summary: >-
      Walk every hook matcher in ~/.claude/settings.json against the live MCP
      tool list. Insert a P2 status_board row per matcher referencing a tool
      that no longer exists or a script path that no longer exists on disk.
    context_addendum: >-
      Per pattern hook-matchers-must-follow-live-dispatch-primitive-not-dead-substrate-2026-05-26
      five hooks targeting the dead SDK-fork / Factory-CLI dispatch primitives
      had to be retired and four others re-targeted to live matchers. The
      audit is the recurring substrate that catches matcher drift before it
      silently disables learning. Probe every script path in settings.json
      with a stat check; any missing file is a P1 silent-disablement. The
      one-liner shell check is documented in backend/CLAUDE.md under the
      hook-stack invariant check section.
    cdp_dependent: false

  - name: applied-tag-telemetry-consumer
    phase: 1
    schedule: every 15m
    tz: Australia/Brisbane
    lm_layer: APPLY
    intent_summary: >-
      Consume application-events.jsonl entries written by the
      applied_tag_telemetry Stop-event hook. Roll up APPLIED, NOT-APPLIED,
      and FALSE-POSITIVE counts per pattern into the rolling telemetry view
      that feeds surfacing-rate-probe and pattern-corpus-health-check.
    context_addendum: >-
      Already shipping as telemetry-dispatch-consumer under a different name;
      confirm coverage and rename in scheduler tasks for consistency. The Stop
      hook tails 2000 lines of transcript, scans for pattern surfacings plus
      APPLIED / NOT-APPLIED / FALSE-POSITIVE markers, and writes JSONL. This
      consumer aggregates per-pattern rates so the weekly health check has
      clean inputs. Per pattern hooks-must-not-fire-inside-applied-pattern-tags
      strip tag lines before scanning to avoid feedback loops. Cap each run
      at the new-since-last-cursor entries to keep run-time bounded.
    cdp_dependent: false

  - name: world-model-audit
    phase: 1
    schedule: weekly Sun 18:00
    tz: Australia/Brisbane
    lm_layer: RE-AUDIT
    intent_summary: >-
      Pick one section of backend/CLAUDE.md (rotate through the file weekly),
      probe every concrete claim against current reality, and insert a P3
      status_board row on drift exceeding 30% of probed claims. The drift
      threshold is per the world-model-staleness pattern.
    context_addendum: >-
      Per pattern world-model-staleness-needs-active-reconciliation-2026-05-17
      this is the routine that keeps the operating manual true rather than
      letting it rot into architectural fiction. The 2026-05-17 cold-start
      audit found five substantial fictions in backend/CLAUDE.md; Tate flagged
      it as "an actual problem that needs attending to". Rotate sections so
      every part gets probed at least quarterly. Use the canonical hierarchy
      (status_board, Neo4j, kv_store, Vercel, Supabase) as ground truth for
      each probe per verify-deployed-state-against-narrated-state. Write the
      audit findings as a Neo4j Episode regardless of drift bucket.
    cdp_dependent: false

  - name: substrate-health-meta-audit
    phase: 1
    schedule: weekly Sun 17:00
    tz: Australia/Brisbane
    lm_layer: RE-AUDIT
    intent_summary: >-
      Walk the seven-layer table from the recursive-improvement loop anatomy
      pattern, hit each substrate (capture, codify, generalise, surface,
      apply, tune, re-audit) for liveness, and write a meta-Episode summarising
      which layers are healthy and which are dark.
    context_addendum: >-
      Per pattern recursive-improvement-loop-anatomy a dark arrow in the
      seven-layer machine is the diagnosis target, not the symptom of a
      weak layer. This meta-audit reads liveness telemetry across all seven
      layers in one pass so the conductor sees the whole machine's state
      rather than one layer at a time. CAPTURE liveness = session-corpus-mining
      and applied-tag-telemetry-consumer fires. CODIFY = patterns-index-regen
      and patterns-skill-mirror-sync. SURFACE = hook matcher health.
      APPLY = APPLIED rate. TUNE = pattern-corpus-health-check fires.
      RE-AUDIT = world-model-audit. Write a Neo4j Episode every fire.
    cdp_dependent: false

  - name: session-corpus-mining-weekly
    phase: 1
    schedule: weekly Sun 22:30
    tz: Australia/Brisbane
    lm_layer: CAPTURE
    intent_summary: >-
