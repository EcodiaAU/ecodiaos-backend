  # ===== PHASE 3: STRETCH (18 crons) =====

  # --- Generalise + meta-learning ---
  - name: generalisation-engine-fire
    phase: 3
    schedule: weekly Sun 21:30
    tz: Australia/Brisbane
    lm_layer: GENERALISE
    intent_summary: >-
      Run the SAMPLE then LIFT then GATE then CONTINUOUS four-step from the
      generalisation-engine pattern. Lift incident-specific patterns to their
      latent general form and record cross-context applicability sets. Write
      lifted patterns to patterns/ as new files with cross-refs to the source.
    context_addendum: >-
      Per pattern generalisation-engine-lifts-specifics-to-general-form every
      incident-specific pattern carries a latent general form plus a
      cross-context applicability set; the engine lifts the specifics to the
      general form so the rule applies in new contexts. SAMPLE picks the
      candidate patterns (single-incident, single-client origins, recent
      authorship). LIFT proposes the general form. GATE checks whether the
      general form actually applies cross-context. CONTINUOUS schedules the
      next sample window. The output is new patterns/ files, not status_board
      rows; the substrate write IS the deliverable.
    cdp_dependent: false

  - name: anti-generalisation-engine-fire
    phase: 3
    schedule: weekly Sun 22:00
    tz: Australia/Brisbane
    lm_layer: GENERALISE
    intent_summary: >-
      Inverse of the generalisation engine. Read the cross-context applicability
      sets emitted by generalisation-engine-fire. For each (general rule,
      target context) pair, draft a specific instantiation scoped to the
      target context: a hook, a pattern file, a CLAUDE.md bullet, a cron
      prompt addition, or a status_board enforcement row. Gate the drafts
      through status_board for Tate-confirm before applying. This closes
      the abstraction-application loop: general lessons become concrete
      enforcements in every context where they apply.
    context_addendum: >-
      Per pattern generalisation-engine-lifts-specifics-to-general-form the
      upstream generalisation-engine-fire cron lifts incident-specific
      patterns to their latent general form and records the cross-context
      applicability set per lifted pattern. This cron is the inverse pass:
      take each general rule plus its applicability set and produce concrete
      instantiations in every target context where the rule applies but is
      not yet enforced. Artefact menu: a PreToolUse or PostToolUse hook
      scoped to the target context, a new pattern file with cross-refs to
      the source general pattern, a CLAUDE.md bullet under the right section,
      a cron prompt addendum surfacing the rule at the right cadence, or a
      status_board enforcement row. Gate the drafts through status_board
      with Tate-confirm rather than applying directly; per
      verify-before-asserting-in-durable-memory the cost of a wrong-context
      instantiation is real and the gate stays explicit. Sister cron
      weekly-doctrine-synthesis picks up confirmed instantiations during
      the same Sunday window. Cap drafts at 10 per fire so the conductor
      review stays tractable.
    cdp_dependent: false

  - name: single-incident-pattern-scan
    phase: 3
    schedule: weekly Sun 21:45
    tz: Australia/Brisbane
    lm_layer: GENERALISE
    intent_summary: >-
      Orphan scan: walk patterns/ for files with date-suffixed filenames
      AND single-client Origin lines, flag as lift candidates for the
      generalisation engine. Insert a P3 status_board row with the candidate
      list and a one-line lift hypothesis per candidate.
    context_addendum: >-
      A date-suffixed filename (e.g. -2026-05-18.md) plus a single-client
      Origin line is the telltale shape of a pattern that has not been
      generalised yet; the rule fires on the incident, but the general form
      is unstated. This cron is the input feeder to generalisation-engine-fire;
      they pair as Sample plus Lift. Read frontmatter and the Origin line
      via a deterministic walk. Cap candidates at 15 per fire so the
      generalisation engine has a tractable working set. Cross-check against
      the GENERALISE layer telemetry for patterns already lifted.
    cdp_dependent: false

  - name: never-surfaced-pattern-scan
    phase: 3
    schedule: weekly Sun 23:00
    tz: Australia/Brisbane
    lm_layer: TUNE
    intent_summary: >-
      Read application-events.jsonl and find patterns with zero fires over
      the last 30 days. Surface retire candidates to status_board. Release
      recipes are excepted per the pattern-lifecycle doctrine since they
      fire only on release events that are rare by design.
    context_addendum: >-
      Per pattern pattern-lifecycle-active-narrowed-archived the zero-fires-30d
      threshold is the archive candidate signal. The exception is release
      recipes (capgo-*, capacitor-*, asc-*, play-console-*) which legitimately
      fire only on release events. Cross-check candidates against patterns/
      frontmatter for an explicit "release-recipe" tag or filename pattern
      and exclude those. Cap candidates at 10 per fire so the conductor
      review during weekly-doctrine-synthesis stays tractable. Per pattern
      cron-deliverables-can-be-conditional-not-all-fires-must-ship a clean
      no-candidates run is correct silent success.
    cdp_dependent: false

  - name: decision-shape-recap
    phase: 3
    schedule: daily 23:00
    tz: Australia/Brisbane
    lm_layer: CAPTURE
    intent_summary: >-
      Scan the last 24 hours of session JSONLs for decision, discovery, or
      mistake turns that did not produce a substrate write. Insert P3 rows
      titled "missed-capture-N" so the next doctrine-synthesis window picks
      up the gap.
    context_addendum: >-
      Per pattern verify-deployed-state-against-narrated-state a narrated
      decision is not a real decision; if the rule did not land in a
      pattern, status_board row, kv_store entry, or Neo4j node, it is
      effectively forgotten. This cron is the safety net catching the gap.
      Heuristic: turn contains a Tate directive verbatim, a stated rule, a
      flagged mistake, or a non-trivial choice point, AND no substrate write
